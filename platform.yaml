# Platform CR — declares almanac as a tenant of the protohype team on the
# eks-agent-platform operator. Apply once per cluster before the
# ApplicationSet entry starts reconciling the chart.
#
# Two CRs declared here:
#   - BudgetPolicy (referenced by Platform.spec.budget — required)
#   - Platform     (the actual tenant declaration)
#
# What the operator reconciles from the Platform CR:
#   - Namespace `tenants-protohype` (Pod Security Standards baseline)
#   - ResourceQuota + LimitRange
#   - Default-deny NetworkPolicy (the chart layers app-specific rules on top)
#   - ArgoCD AppProject scoped to this Platform
#   - Per-Platform IRSA role with baseline policy + spec.identity.extraPolicyArns
#     attached. Trust policy permits the `tenant-runtime` ServiceAccount in
#     the tenant namespace
#
# What almanac's chart owns separately (NOT operator-reconciled):
#   - The chart's own ServiceAccount (`almanac`) — used by both the main pod
#     and the audit-consumer Deployment. Its `eks.amazonaws.com/role-arn`
#     annotation comes from landing-zone's almanac-platform component
#     (output: irsa_role_arn) via per-env Helm values (aws.platformRoleArn).
#     The operator's `<env>-almanac-tenant` role trusts the `tenant-runtime`
#     SA, not almanac's `almanac` SA — different SA, different trust, two
#     roles serving two workload classes (AgentFleet pods vs almanac's
#     app pods)
#
# Tenant-shared infra (KMS, DDB, SQS, S3, Aurora pgvector, ElastiCache
# Redis, Bedrock invoke policy, Secrets Manager seeding) — see landing-zone's
# components/aws/almanac-platform/. Once that component's per-env entry
# applies, the outputs are wired into the chart's per-env values
# (`tenantInfra.*` + `aws.platformRoleArn`).

---
apiVersion: governance.nanohype.dev/v1alpha1
kind: BudgetPolicy
metadata:
  name: almanac
  namespace: tenants-protohype
spec:
  platformRef:
    name: almanac
  # Soft threshold; kill-switch fires at 120% (USD 6000) when KillSwitchEnabled
  # is true. Higher than marshal's because almanac drives both Bedrock LLM
  # calls (Claude Sonnet 4.6) and Bedrock embeddings (Titan) at every query.
  monthlyUsd: "5000"
  alertThresholdsPercent: [50, 80, 100]
  killSwitchEnabled: true
---
apiVersion: platform.nanohype.dev/v1alpha1
kind: Platform
metadata:
  name: almanac
  namespace: tenants-protohype
spec:
  displayName: almanac
  persona: support
  tenant: protohype
  budget:
    name: almanac
  identity:
    # Bedrock model access for AgentFleet pods (tenant-runtime SA on the
    # operator-reconciled IRSA role). almanac's own app pods don't use this
    # role; they assume the landing-zone-owned `almanac-platform` IRSA role
    # (via aws.platformRoleArn in the chart). The operator's role still
    # exists for AgentFleet workloads in this namespace if/when they land.
    allowedModelFamilies:
      - anthropic
      - amazon
    # ARN(s) of additional managed policies the operator attaches on top of
    # the per-tenant baseline. Populate once landing-zone's almanac-platform
    # component is refactored to emit `irsa_managed_policy_arn` as an
    # output. Leave empty until then — the chart's app pods don't need this
    # since they assume the landing-zone-owned role directly.
    extraPolicyArns: []
  compliance:
    soc2: true
  isolation: namespace
