{{- if .Values.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "almanac.serviceAccountName" . }}
  labels:
    {{- include "almanac.labels" . | nindent 4 }}
  # Both workloads (main pod + audit-consumer) share one ServiceAccount. The
  # IRSA role is provisioned by landing-zone's almanac-platform component —
  # its trust policy permits assumption by this SA in this namespace, and
  # its inline policy bundles every action the pods need (DDB rw, SQS rw,
  # S3 PutObject, KMS Encrypt/Decrypt on the token-store key, Bedrock invoke,
  # Secrets Manager read, CloudWatch PutMetricData). The role ARN is the
  # component's `irsa_role_arn` output; per-env values plumb it into
  # `aws.platformRoleArn`, and the annotation below picks it up.
  {{- if or .Values.aws.platformRoleArn .Values.serviceAccount.annotations }}
  annotations:
    {{- if .Values.aws.platformRoleArn }}
    eks.amazonaws.com/role-arn: {{ .Values.aws.platformRoleArn | quote }}
    {{- end }}
    {{- with .Values.serviceAccount.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- end }}
{{- end }}
