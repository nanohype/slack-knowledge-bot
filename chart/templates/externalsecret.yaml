{{- if .Values.externalSecret.enabled -}}
# ExternalSecret synces the app's secret material from AWS Secrets Manager
# into a Kubernetes Secret. The CDK stack used Secrets Manager's
# {placeholder, generated STATE_SIGNING_SECRET} seed pattern; here we keep the
# AWS Secrets Manager source unchanged and let External Secrets Operator
# pull it into the cluster as a Secret that the Deployment's envFrom mounts.
#
# RDS master credentials live in their own Secrets Manager secret
# (`almanac/<env>/db-credentials`) created by the landing-zone `rag` component;
# PGUSER + PGPASSWORD keys are pulled from that secret via a second
# ExternalSecret data entry.

apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ include "almanac.fullname" . }}-secrets
  labels:
    {{- include "almanac.labels" . | nindent 4 }}
spec:
  refreshInterval: {{ .Values.externalSecret.refreshInterval }}
  secretStoreRef:
    name: {{ .Values.externalSecret.secretStore }}
    kind: ClusterSecretStore
  target:
    name: {{ include "almanac.fullname" . }}-secrets
    creationPolicy: Owner
  data:
    # App-level secrets — Slack, WorkOS, per-source OAuth client credentials,
    # STATE_SIGNING_SECRET.
    - secretKey: SLACK_BOT_TOKEN
      remoteRef:
        key: {{ .Values.externalSecret.remoteRefSecret }}
        property: SLACK_BOT_TOKEN
    - secretKey: SLACK_SIGNING_SECRET
      remoteRef:
        key: {{ .Values.externalSecret.remoteRefSecret }}
        property: SLACK_SIGNING_SECRET
    - secretKey: SLACK_APP_TOKEN
      remoteRef:
        key: {{ .Values.externalSecret.remoteRefSecret }}
        property: SLACK_APP_TOKEN
    - secretKey: WORKOS_API_KEY
      remoteRef:
        key: {{ .Values.externalSecret.remoteRefSecret }}
        property: WORKOS_API_KEY
    - secretKey: WORKOS_DIRECTORY_ID
      remoteRef:
        key: {{ .Values.externalSecret.remoteRefSecret }}
        property: WORKOS_DIRECTORY_ID
    - secretKey: NOTION_OAUTH_CLIENT_ID
      remoteRef:
        key: {{ .Values.externalSecret.remoteRefSecret }}
        property: NOTION_OAUTH_CLIENT_ID
    - secretKey: NOTION_OAUTH_CLIENT_SECRET
      remoteRef:
        key: {{ .Values.externalSecret.remoteRefSecret }}
        property: NOTION_OAUTH_CLIENT_SECRET
    - secretKey: CONFLUENCE_OAUTH_CLIENT_ID
      remoteRef:
        key: {{ .Values.externalSecret.remoteRefSecret }}
        property: CONFLUENCE_OAUTH_CLIENT_ID
    - secretKey: CONFLUENCE_OAUTH_CLIENT_SECRET
      remoteRef:
        key: {{ .Values.externalSecret.remoteRefSecret }}
        property: CONFLUENCE_OAUTH_CLIENT_SECRET
    - secretKey: GOOGLE_OAUTH_CLIENT_ID
      remoteRef:
        key: {{ .Values.externalSecret.remoteRefSecret }}
        property: GOOGLE_OAUTH_CLIENT_ID
    - secretKey: GOOGLE_OAUTH_CLIENT_SECRET
      remoteRef:
        key: {{ .Values.externalSecret.remoteRefSecret }}
        property: GOOGLE_OAUTH_CLIENT_SECRET
    - secretKey: STATE_SIGNING_SECRET
      remoteRef:
        key: {{ .Values.externalSecret.remoteRefSecret }}
        property: STATE_SIGNING_SECRET
    # RDS master credentials from the landing-zone-provisioned secret
    - secretKey: PGUSER
      remoteRef:
        key: {{ .Values.externalSecret.dbCredentialsSecret }}
        property: username
    - secretKey: PGPASSWORD
      remoteRef:
        key: {{ .Values.externalSecret.dbCredentialsSecret }}
        property: password
{{- end }}
