{{- if and .Values.auditConsumer.enabled .Values.auditConsumer.keda.enabled -}}
# KEDA ScaledObject — drives replica count of the audit-consumer Deployment
# off the SQS audit queue depth. Triggers fetch metrics via the pod's IRSA
# role (podIdentity: aws), so no separate credentials secret is needed.
#
# Required IAM permission for the IAM role: sqs:GetQueueAttributes on the
# audit queue ARN. The Platform CR's slack-knowledge-bot-sqs-consumer policy includes
# this alongside ReceiveMessage / DeleteMessage / SendMessage.
#
# Set `keda.enabled: false` to disable KEDA scaling and manage replicas
# manually via the Deployment spec.

apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: {{ include "tenant-chart-base.fullname" . }}-audit-consumer
  labels:
    {{- include "tenant-chart-base.labels" . | nindent 4 }}
    slack-knowledge-bot.io/service: audit-consumer
spec:
  scaleTargetRef:
    name: {{ include "tenant-chart-base.fullname" . }}-audit-consumer
  pollingInterval: {{ .Values.auditConsumer.keda.pollingInterval }}
  cooldownPeriod: {{ .Values.auditConsumer.keda.cooldownPeriod }}
  minReplicaCount: {{ .Values.auditConsumer.keda.minReplicas }}
  maxReplicaCount: {{ .Values.auditConsumer.keda.maxReplicas }}
  advanced:
    horizontalPodAutoscalerConfig:
      behavior:
        scaleDown:
          stabilizationWindowSeconds: 300   # avoid flapping on bursty queues
          policies:
            - type: Percent
              value: 50
              periodSeconds: 60
        scaleUp:
          stabilizationWindowSeconds: 0
          policies:
            - type: Percent
              value: 100
              periodSeconds: 30
  triggers:
    - type: aws-sqs-queue
      metadata:
        queueURL: {{ .Values.tenantInfra.sqsAuditQueueUrl | quote }}
        queueLength: {{ .Values.auditConsumer.keda.targetQueueLength | quote }}
        awsRegion: {{ .Values.env.AWS_REGION | quote }}
        identityOwner: operator   # use the pod's IAM role, not KEDA's own
{{- end }}
