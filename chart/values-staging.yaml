# Staging delta.
image:
  tag: staging

replicaCount: 1

ingress:
  hosts:
    - host: slack-knowledge-bot-staging.example.com
      paths:
        - path: /health
          pathType: Exact
        - path: /oauth
          pathType: Prefix

externalSecret:
  remoteRefSecret: slack-knowledge-bot/staging/app-secrets
  dbCredentialsSecret: slack-knowledge-bot/staging/db-credentials

env:
  NODE_ENV: production
  OTEL_RESOURCE_ATTRIBUTES: 'service.namespace=slack-knowledge-bot,service.version=0.1.0,deployment.environment=staging,agents.tenant=protohype,agents.platform=slack-knowledge-bot'

tenantInfra:
  # Fill the empties below from the landing-zone slack-knowledge-bot-platform staging
  # outputs (terragrunt output -json). Slot names match output names 1:1.
  dynamodbTableTokens: slack-knowledge-bot-staging-tokens
  dynamodbTableAudit: slack-knowledge-bot-staging-audit
  dynamodbTableIdentityCache: slack-knowledge-bot-staging-identity-cache
  sqsAuditQueueUrl: ''
  sqsAuditDlqUrl: ''
  redisUrl: ''
  kmsKeyId: ''
  pgHost: ''
  auditBucket: ''
