# Production delta.
image:
  tag: production

replicaCount: 2

resources:
  requests:
    cpu: 500m
    memory: 1Gi
  limits:
    cpu: 2000m
    memory: 2Gi

ingress:
  hosts:
    - host: slack-knowledge-bot.example.com
      paths:
        - path: /health
          pathType: Exact
        - path: /oauth
          pathType: Prefix

externalSecret:
  remoteRefSecret: slack-knowledge-bot/production/app-secrets
  dbCredentialsSecret: slack-knowledge-bot/production/db-credentials

env:
  NODE_ENV: production
  OTEL_RESOURCE_ATTRIBUTES: 'service.namespace=slack-knowledge-bot,service.version=0.1.0,deployment.environment=production,agents.tenant=protohype,agents.platform=slack-knowledge-bot'

tenantInfra:
  # Fill the empties below from the landing-zone slack-knowledge-bot-platform production
  # outputs (terragrunt output -json). Slot names match output names 1:1.
  dynamodbTableTokens: slack-knowledge-bot-production-tokens
  dynamodbTableAudit: slack-knowledge-bot-production-audit
  dynamodbTableIdentityCache: slack-knowledge-bot-production-identity-cache
  sqsAuditQueueUrl: ''
  sqsAuditDlqUrl: ''
  redisUrl: ''
  kmsKeyId: ''
  pgHost: ''
  auditBucket: ''
