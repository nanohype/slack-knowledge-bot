# Dev delta.
image:
  tag: dev

replicaCount: 1

ingress:
  hosts:
    - host: almanac-dev.example.com
      paths:
        - path: /health
          pathType: Exact
        - path: /oauth
          pathType: Prefix

externalSecret:
  remoteRefSecret: almanac/dev/app-secrets
  dbCredentialsSecret: almanac/dev/db-credentials

env:
  NODE_ENV: production
  OTEL_RESOURCE_ATTRIBUTES: "service.namespace=almanac,service.version=0.1.0,deployment.environment=dev,agents.tenant=protohype,agents.platform=almanac"

aws:
  # Fill from landing-zone `almanac-platform` (dev) output: irsa_role_arn.
  # `tofu -chdir=live/aws/workload-dev/us-west-2/dev/almanac-platform output -raw irsa_role_arn`
  platformRoleArn: ""

tenantInfra:
  # Fill the empties below from the landing-zone almanac-platform dev
  # outputs (terragrunt output -json). Slot names match output names 1:1.
  dynamodbTableTokens: almanac-tokens-dev
  dynamodbTableAudit: almanac-audit-dev
  dynamodbTableIdentityCache: almanac-identity-cache-dev
  sqsAuditQueueUrl: ""
  sqsAuditDlqUrl: ""
  redisUrl: ""
  kmsKeyId: ""
  pgHost: ""
  auditBucket: ""
