# Dev delta.
image:
  tag: dev

replicaCount: 1

ingress:
  hosts:
    - host: slack-knowledge-bot-dev.example.com
      paths:
        - path: /health
          pathType: Exact
        - path: /oauth
          pathType: Prefix

externalSecret:
  remoteRefSecret: slack-knowledge-bot/dev/app-secrets
  dbCredentialsSecret: slack-knowledge-bot/dev/db-credentials

env:
  NODE_ENV: production
  OTEL_RESOURCE_ATTRIBUTES: 'service.namespace=slack-knowledge-bot,service.version=0.1.0,deployment.environment=dev,agents.tenant=protohype,agents.platform=slack-knowledge-bot'

tenantInfra:
  # Fill the empties below from the landing-zone slack-knowledge-bot-platform dev
  # outputs (terragrunt output -json). Slot names match output names 1:1.
  dynamodbTableTokens: slack-knowledge-bot-dev-tokens
  dynamodbTableAudit: slack-knowledge-bot-dev-audit
  dynamodbTableIdentityCache: slack-knowledge-bot-dev-identity-cache
  sqsAuditQueueUrl: ''
  sqsAuditDlqUrl: ''
  redisUrl: ''
  kmsKeyId: ''
  pgHost: ''
  auditBucket: ''
