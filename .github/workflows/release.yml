name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  packages: write
  id-token: write

env:
  IMAGE: ghcr.io/nanohype/slack-knowledge-bot

jobs:
  image:
    name: build + sign image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: sigstore/cosign-installer@v3
      - uses: anchore/sbom-action/download-syft@v0
      - name: derive version
        id: ver
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"
      - name: docker login (ghcr.io)
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - name: build + push (multi-arch)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          provenance: mode=max
          sbom: true
          tags: |
            ${{ env.IMAGE }}:${{ steps.ver.outputs.version }}
            ${{ env.IMAGE }}:latest
      - name: sign (keyless, OIDC)
        run: |
          cosign sign --yes ${{ env.IMAGE }}:${{ steps.ver.outputs.version }}
      - name: sbom
        run: |
          syft "${{ env.IMAGE }}:${{ steps.ver.outputs.version }}" -o spdx-json > sbom.spdx.json
          cosign attest --yes --predicate sbom.spdx.json --type spdxjson ${{ env.IMAGE }}:${{ steps.ver.outputs.version }}
      - uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ steps.ver.outputs.version }}
          path: sbom.spdx.json
